<style>
  :root{
    --bg-0:#180a2e;
    --bg-1:#26103f;
    --magenta:#ff2d78;
    --gold:#ffc93c;
    --violet:#8b5cf6;
    --cyan:#22d3ee;
    --text:#fdf6ff;
    --muted:#c9b8de;
    --card:#2a1245;
    --card-line:#432066;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg-0);
    color:var(--text);
    font-family:'Kanit',sans-serif;
    overflow-x:hidden;
  }
  h1,h2,h3,.display{font-family:'Anton',sans-serif;letter-spacing:0.5px;text-transform:uppercase;}
  a{color:inherit;text-decoration:none;}
  img{display:block;max-width:100%;}
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px;}

  /* ================= NAV ================= */
  nav{
    position:sticky;top:0;z-index:50;
    background:rgba(24,10,46,0.85);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--card-line);
  }
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;}
  .brand{font-family:'Anton',sans-serif;font-size:18px;letter-spacing:1px;}
  .brand span{color:var(--gold);}
  .nav-call{
    display:flex;align-items:center;gap:8px;
    background:linear-gradient(135deg,var(--magenta),var(--violet));
    padding:9px 18px;border-radius:9999px;font-weight:700;font-size:13px;
  }

  /* ================= HERO ================= */
  .hero{
    position:relative;
    padding:76px 0 90px;
    overflow:hidden;
  }
  .hero-glow{
    position:absolute;inset:-20% -10%;
    background:
      radial-gradient(38% 45% at 15% 20%, rgba(255,45,120,0.55), transparent 70%),
      radial-gradient(45% 50% at 85% 10%, rgba(139,92,246,0.5), transparent 70%),
      radial-gradient(35% 40% at 60% 85%, rgba(255,201,60,0.35), transparent 70%);
    filter:blur(10px);
    animation:drift 14s ease-in-out infinite alternate;
    z-index:0;
  }
  @keyframes drift{
    0%{ transform: translate(0,0) scale(1); }
    100%{ transform: translate(2%, -3%) scale(1.06); }
  }
  .hero-content{position:relative;z-index:1;text-align:center;}
  .rec-chip{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.18);
    padding:7px 16px;border-radius:9999px;
    font-size:12px;font-weight:600;color:var(--muted);
    margin-bottom:22px;
  }
  .rec-dot{width:8px;height:8px;border-radius:9999px;background:var(--magenta);box-shadow:0 0 0 0 rgba(255,45,120,0.6);animation:pulse 1.6s infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(255,45,120,0.55);}
    70%{box-shadow:0 0 0 9px rgba(255,45,120,0);}
    100%{box-shadow:0 0 0 0 rgba(255,45,120,0);}
  }
  .hero h1{
    font-size:clamp(40px,7vw,78px);
    line-height:1.02;
    background:linear-gradient(120deg,#fff 30%, var(--gold) 60%, var(--magenta) 90%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .hero p.lead{
    max-width:620px;margin:22px auto 0;
    color:var(--muted); font-size:16px; line-height:1.7;
  }
  .hero-cta{display:flex;gap:14px;justify-content:center;margin-top:34px;flex-wrap:wrap;}
  .btn{
    display:inline-flex;align-items:center;gap:10px;
    padding:15px 30px;border-radius:9999px;font-weight:700;font-size:15px;
    border:none;cursor:pointer;
  }
  .btn-primary{background:linear-gradient(135deg,var(--magenta),var(--violet));color:white;box-shadow:0 10px 30px -8px rgba(255,45,120,0.55);}
  .btn-line{background:#06c755;color:white;}
  .price-badge{
    display:inline-flex;align-items:center;gap:10px;margin-top:36px;
    background:var(--card);border:1px solid var(--card-line);
    padding:14px 26px;border-radius:20px;
  }
  .price-badge b{font-family:'Anton',sans-serif;font-size:26px;color:var(--gold);}
  .price-badge .divider{width:1px;height:26px;background:var(--card-line);}

  /* ================= SERVICES STRIP ================= */
  .services{padding:10px 0 50px;position:relative;z-index:1;}
  .chip-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
  .chip{
    background:var(--card);border:1px solid var(--card-line);
    padding:10px 18px;border-radius:9999px;font-size:13px;font-weight:500;
    display:flex;align-items:center;gap:8px;color:var(--text);
  }

  /* ================= CATEGORY SHOWCASE ================= */
  .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .cat-card{
    position:relative;aspect-ratio:4/3;border-radius:18px;overflow:hidden;
    border:1px solid var(--card-line);cursor:default;
    transform:translateY(0) scale(1);
    transition:transform .28s cubic-bezier(.34,1.56,.64,1), box-shadow .28s ease;
  }
  .cat-card:hover{transform:translateY(-6px) scale(1.035);box-shadow:0 18px 34px -14px rgba(0,0,0,0.55);}
  .cat-texture{position:absolute;inset:0;background-size:cover;background-position:center;filter:saturate(1.15);}
  .cat-tint{position:absolute;inset:0;mix-blend-mode:multiply;opacity:0.75;}
  .cat-1 .cat-tint{background:linear-gradient(155deg,#ff2d78,#7a1d4f 70%);}
  .cat-2 .cat-tint{background:linear-gradient(155deg,#8b5cf6,#341a6b 70%);}
  .cat-3 .cat-tint{background:linear-gradient(155deg,#ffc93c,#8a5a10 70%);}
  .cat-4 .cat-tint{background:linear-gradient(155deg,#22d3ee,#0e5866 70%);}
  .cat-5 .cat-tint{background:linear-gradient(155deg,#ff2d78,#341a6b 70%);}
  .cat-6 .cat-tint{background:linear-gradient(155deg,#8b5cf6,#8a5a10 70%);}
  .cat-icon{
    position:absolute;top:10px;right:12px;
    font-size:20px;opacity:0.9;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    z-index:2;
  }
  .cat-shade{position:absolute;inset:0;background:linear-gradient(0deg, rgba(10,4,20,0.88) 0%, rgba(10,4,20,0.05) 55%);}
  .cat-num{
    position:absolute;top:12px;left:14px;font-family:'Anton',sans-serif;
    font-size:13px;color:rgba(255,255,255,0.75);letter-spacing:1px;
  }
  .cat-label{position:absolute;bottom:14px;left:16px;right:16px;}
  .cat-label .name{font-family:'Anton',sans-serif;font-size:18px;color:white;letter-spacing:0.5px;}
  .cat-label .sub{font-size:11px;color:var(--muted);margin-top:2px;}

  /* ================= SECTION HEAD ================= */
  .section{padding:70px 0;}
  .section-eyebrow{
    color:var(--gold);font-weight:700;font-size:12px;letter-spacing:2px;
    text-transform:uppercase;margin-bottom:10px;text-align:center;
  }
  .section h2{font-size:clamp(28px,4vw,42px);text-align:center;margin-bottom:16px;}
  .section .sub{color:var(--muted);text-align:center;max-width:560px;margin:0 auto 44px;font-size:15px;line-height:1.7;}

  /* ================= PRICING ================= */
  .price-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
  .price-card{
    background:var(--card);border:1px solid var(--card-line);border-radius:22px;
    padding:28px 22px;display:flex;flex-direction:column;gap:14px;position:relative;
  }
